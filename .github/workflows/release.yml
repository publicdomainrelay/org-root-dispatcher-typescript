name: Release

on:
  workflow_run:
    workflows: ["Build"]
    branches: [main]
    types:
      - completed

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Move latest tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git latest -f

      - name: Delete existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag || true
          git tag -f latest
          git push origin latest -f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Release
          body: |
            Latest build from `main` branch.

            ### Platform archives
            - `binaries-linux-x64.tar.gz` — Linux x86_64 (14 binaries)
            - `binaries-windows-x64.zip` — Windows x86_64 (14 binaries, .exe)
            - `binaries-macos-arm64.tar.gz` — macOS Apple Silicon (14 binaries)

            ### SPAs
            - `compute-spa.tar.gz` — Compute SPA browser bundle
            - `did-key-associator.tar.gz` — DID Key Associator browser bundle

            Built from commit: ${{ github.sha }}
          files: ./release-artifacts/**/*
          fail_on_unmatched_files: false
