name: Build

on:
  push:
    branches: [main]

permissions: {}

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x64
          - os: ubuntu-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-arm64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          persist-credentials: false

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Compile binaries
        run: |
          mkdir -p dist
          set -e
          BINS="\
            atproto-market/hono-bidder/mod.ts hono-bidder \
            atproto-market/request-vm-ssh/mod.ts request-vm-ssh \
            atproto-market/hono-compute-contract-gateway/mod.ts compute-contract-gateway \
            atproto-market/hono-policy/mod.ts hono-policy \
            atproto-market/hono-plc/mod.ts hono-plc \
            hono-pds/main.ts hono-pds \
            did-key-relay/hono-did-key-relay-relayer/mod.ts hono-did-key-relay-relayer \
            did-key-relay/hono-did-key-relay-subscriber/mod.ts hono-did-key-relay-subscriber \
            did-key-relay/hono-did-key-relay-tunnel-subscriber/mod.ts tunnel-subscriber \
            did-key-relay/hono-did-key-relay-tunnel/mod.ts tunnel \
            hono-compute-provider/hono-compute-provider/mod.ts hono-compute-provider \
            deno-worker-sandbox/hono-compute-deno/mod.ts hono-compute-deno \
            deno-worker-sandbox/hono-sandbox/mod.ts hono-sandbox \
            typescript-helpers/hono-http-static/mod.ts hono-http-static"
          while read -r src name; do
            [ -z "$src" ] && continue
            if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then
              deno compile --allow-all --target ${{ matrix.target }} \
                --output "dist/${name}.exe" "$src"
            else
              deno compile --allow-all --target ${{ matrix.target }} \
                --output "dist/${name}" "$src"
            fi
          done <<BINS
          $BINS
          BINS

      - name: Build SPAs
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          cd compute-spa && deno run -A build.ts
          tar -czf ../dist/compute-spa.tar.gz -C dist .
          cd ../did-key-associator && deno run -A build.ts
          tar -czf ../dist/did-key-associator.tar.gz -C dist .

      - name: Create platform archive
        run: |
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then
            zip -j dist/binaries-${{ matrix.suffix }}.zip dist/*.exe
          else
            tar -czf dist/binaries-${{ matrix.suffix }}.tar.gz -C dist $(ls dist | grep -v '\.tar\.gz$' | grep -v '\.zip$')
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deno-binaries-${{ matrix.suffix }}
          path: |
            dist/*
