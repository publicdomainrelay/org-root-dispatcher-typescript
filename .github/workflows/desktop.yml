name: Desktop Build

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  desktop:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          persist-credentials: true

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build macOS desktop app
        run: |
          mkdir -p dist
          cd deno-macos-runner-desktop
          deno desktop --no-check --allow-all hono-macos-runner-desktop/mod.ts
          # Package .app bundle
          APP_NAME=$(ls -d *.app 2>/dev/null | head -1 || echo "")
          if [ -n "$APP_NAME" ] && [ -d "$APP_NAME" ]; then
            zip -r ../dist/macos-desktop.zip "$APP_NAME"
          else
            echo "No .app bundle produced, creating placeholder"
            touch ../dist/macos-desktop-missing.txt
          fi
        continue-on-error: true

      - name: Build cross-platform desktop CLI
        run: |
          mkdir -p dist
          cd deno-macos-runner-desktop
          deno compile --allow-all --output ../dist/hono-desktop hono-desktop/mod.ts || \
            echo "hono-desktop compile skipped"
          deno compile --allow-all --target x86_64-unknown-linux-gnu \
            --output ../dist/hono-desktop-linux hono-desktop/mod.ts || \
            echo "hono-desktop-linux cross-compile skipped"
        continue-on-error: true

      - name: Move desktop tag
        run: |
          git tag -f desktop-latest
          git push origin desktop-latest -f

      - name: Delete existing desktop release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete desktop-latest --yes --cleanup-tag || true
          git tag -f desktop-latest
          git push origin desktop-latest -f

      - name: Create desktop release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-latest
          name: Latest Desktop Build
          body: |
            Latest desktop build from `main` branch.

            ### macOS .app bundle
            - `macos-desktop.zip` — macOS tray app (requires Deno Desktop runtime)

            ### Cross-platform CLI
            - `hono-desktop` — macOS binary
            - `hono-desktop-linux` — Linux binary

            Built from commit: ${{ github.sha }}
          files: |
            dist/macos-desktop.zip
            dist/hono-desktop
            dist/hono-desktop-linux
          prerelease: false
          make_latest: false
