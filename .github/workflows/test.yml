name: Test

on:
  push:
    branches:
      - '*'
    paths-ignore:
      - 'README.md'

  pull_request:
    branches:
      - 'main'
    paths-ignore:
      - 'README.md'

permissions: {}

jobs:
  discover:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      test_matrix: ${{ steps.discover.outputs.test_matrix }}
      typecheck_matrix: ${{ steps.discover.outputs.typecheck_matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          persist-credentials: false

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Discover workspaces
        id: discover
        run: |
          deno run -A scripts/ci-discover.ts > /tmp/matrix.json
          {
            echo "test_matrix=$(jq -c '.test' /tmp/matrix.json)"
            echo "typecheck_matrix=$(jq -c '.typecheck' /tmp/matrix.json)"
          } >> "$GITHUB_OUTPUT"

  test:
    needs: discover
    if: ${{ needs.discover.outputs.test_matrix != '[]' && needs.discover.outputs.test_matrix != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        workspace: ${{ fromJson(needs.discover.outputs.test_matrix) }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          persist-credentials: false

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run tests (${{ matrix.workspace.label }})
        working-directory: ${{ matrix.workspace.dir }}
        run: deno test ${{ matrix.workspace.flags }}

  typecheck:
    needs: discover
    if: ${{ needs.discover.outputs.typecheck_matrix != '[]' && needs.discover.outputs.typecheck_matrix != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        entry: ${{ fromJson(needs.discover.outputs.typecheck_matrix) }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          persist-credentials: false

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type check (${{ matrix.entry.entrypoint }})
        run: deno check --config ${{ matrix.entry.config }} ${{ matrix.entry.entrypoint }}
