name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          persist-credentials: false

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Smoke tests
        run: |
          deno test --allow-all --no-check --config atproto-market/deno.json atproto-market/request-vm-ssh/cli_smoke_test.ts
          deno test --allow-all --no-check --config hono-pds/deno.json hono-pds/test/cli_smoke_test.ts
          deno test --allow-all --no-check --config hono-compute-provider/deno.json hono-compute-provider/test/cli_smoke_test.ts
          deno test --allow-all --no-check --config typescript-helpers/deno.json typescript-helpers/test/cli_smoke_test.ts
          deno test --allow-all --no-check --config deno-worker-sandbox/deno.json deno-worker-sandbox/test/cli_smoke_test.ts
          deno test --allow-all --no-check --config did-key-relay/deno.json did-key-relay/test/tunnel_test.ts
          deno test --allow-all --no-check --config hono-jsr/deno.json hono-jsr/hono-package-registry/cli_smoke_test.ts

      - name: Type check
        run: |
          deno check --config atproto-market/deno.json atproto-market/request-vm-ssh/mod.ts
          deno check --config atproto-market/deno.json atproto-market/hono-bidder/mod.ts
          deno check --config atproto-market/deno.json atproto-market/hono-compute-contract-gateway/mod.ts
          deno check --config atproto-market/deno.json atproto-market/hono-policy/mod.ts
          deno check --config hono-pds/deno.json hono-pds/main.ts
